<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angelo Santos</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <nav class="navbar">
        <div class="logo">Mensagem ao Desenvolvedor</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="sobre.html">Sobre</a></li>
            <li><a href="projeto.html">Projetos</a></li>
            <li><a href="habilidades.html">Habilidades</a></li>
            <li><a href="contactos.html" class="active">Contato</a></li>
            <li><a href="download.html">Download</a></li>
        </ul>
    </nav>
</header>

<main>

    <section class="section">
        <div class="glass-box">

            <h1>Fala comigo</h1>
            <p>Preenche o formulário abaixo e entrarei em contacto contigo.</p>

            <form class="contact-form">

                <label for="nome">Nome Completo</label>
                <input 
                    type="text"
                    id="nome"
                    name="nome"
                    placeholder="Digite o seu nome"
                    required
                    minlength="5"
                    maxlength="100"
                    style="margin-right:auto;"
                >

                <label for="email">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Digite o seu email"
                    style="margin-right:auto;"
                    required
                >
<br>
                <label for="mensagem">Mensagem</label>
                <textarea
                    id="mensagem"
                    name="mensagem"
                    placeholder="Digite a sua mensagem"
                    required
                    minlength="50"
                    maxlength="900"
                    style="width: 910px; height: 110px;"
                ></textarea>
<br>
                <button type="submit">Enviar Mensagem</button>
                <style>
                    .contact-form {
                        display: block;
                        flex-direction: column;
                        gap: 15px;
                        margin: 0 auto;
                    }
                </style>

            </form>

        </div>
    </section>

</main>

<footer class="footer">
    <p>© 2026 – Angelo Santos</p>
</footer>

</body>
</html>
